# Déploiement : backend, frontend, Redis, Caddy
# MySQL : à lancer à part ou utiliser une base existante (voir .env)
# Usage : cp .env.example .env && éditer .env puis docker compose --profile tunnel up -d
#
# Ports hôte 9080/9443 pour éviter conflit avec PACS (80/443). Accès prod : https://sociomed-senat.app via Cloudflare Tunnel.

services:
  backend:
    build:
      context: ./backend_courriers_medical_qrcode3
      dockerfile: Dockerfile
    image: pec-backend:latest
    container_name: pec-backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: production
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      APP_PUBLIC_BASE_URL: ${APP_PUBLIC_BASE_URL}
      APP_FRONT_BASE_URL: ${APP_FRONT_BASE_URL}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      # JVM 16 vCPU / 64 Go (surchargeable via .env JAVA_OPTS)
      JAVA_OPTS: "${JAVA_OPTS:--Xms2g -Xmx24g -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -XX:+UseStringDeduplication -Djava.security.egd=file:/dev/./urandom}"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      - redis
    networks:
      pec-net:
        aliases:
          - backend
    # 16c/64G : limiter le backend pour laisser de la RAM à Redis, Caddy, OS (docker compose respecte mem_limit)
    mem_limit: 28g
    mem_reservation: 1g

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${APP_FRONT_BASE_URL}/api
    image: pec-frontend:latest
    container_name: pec-frontend
    restart: unless-stopped
    networks:
      pec-net:
        aliases:
          - frontend

  redis:
    image: docker.io/library/redis:7-alpine
    container_name: pec-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    # Production : 1 Go max, éviction LRU si dépassement (session/cache)
    command: redis-server --appendonly yes --maxmemory 1gb --maxmemory-policy allkeys-lru --tcp-keepalive 60
    mem_limit: 1536m
    networks:
      pec-net:
        aliases:
          - redis

  caddy:
    image: docker.io/library/caddy:2-alpine
    container_name: pec-caddy
    restart: unless-stopped
    # 9080/9443 pour ne pas conflit avec PACS (80/443). Accès web : Cloudflare Tunnel -> caddy:80
    ports:
      - "9080:80"
      - "9443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: ${DOMAIN:-localhost}
      BACKEND_URL: http://backend:8085
      FRONTEND_URL: http://frontend:80
    depends_on:
      - backend
      - frontend
    networks:
      pec-net:
        aliases:
          - caddy

  # Tunnel Cloudflare — pointez la route publiée vers http://caddy:80 (pas frontend:80)
  # Démarrage : docker compose --profile tunnel up -d
  cloudflared:
    image: docker.io/cloudflare/cloudflared:latest
    container_name: pec-cloudflared
    restart: unless-stopped
    env_file: .env
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARED_TUNNEL_TOKEN}
    # Token passé via TUNNEL_TOKEN (compose substitue depuis .env)
    command: ["sh", "-c", "if [ -z \"$$TUNNEL_TOKEN\" ]; then echo 'ERREUR: CLOUDFLARED_TUNNEL_TOKEN manquant dans .env'; exit 1; fi; exec cloudflared tunnel --no-autoupdate run --token \"$$TUNNEL_TOKEN\""]
    depends_on:
      - caddy
    networks:
      pec-net:
        aliases:
          - cloudflared
    profiles:
      - tunnel

volumes:
  uploads_data:
  redis_data:
  caddy_data:
  caddy_config:

networks:
  pec-net:
    driver: bridge
