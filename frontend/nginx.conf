server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # index.html ne doit pas être mis en cache : après chaque déploiement les chunks ont de nouveaux noms
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    # SPA : toute route sert index.html ; ne pas cacher pour avoir les bons chunks après déploiement
    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri $uri/ /index.html;
    }

    # Assets avec hash (ex. /assets/xxx.js) : cache long (les noms changent à chaque build)
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
}
